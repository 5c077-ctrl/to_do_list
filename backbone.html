<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma To-Do List</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header class="header">
        <div class="month-selector">
            <button>&lt;</button>
            <h2>Avril 2026</h2>
            <button>&gt;</button>
        </div>
        <div class="days-row">
            <div class="day"><span>Mer</span><span class="active-date">15</span></div>
            <div class="day"><span>Jeu</span><span>16</span></div>
            <div class="day"><span>Ven</span><span>17</span></div>
        </div>
    </header>
    <main class="task-container" id="task-list">
        <div class="task-card">
            <div class="task-info">
                <span class="time">12:23 PM</span>
                <div class="task-details">
                    <h3>Restart workouts around...</h3>
                    <div class="tags">
                        <span class="tag daily">Daily Goal</span>
                        <span class="tag focus">Focus</span>
                    </div>
                </div>
            </div>
            <div class="checkbox"></div>
        </div>
        </main>
        <div class="floating-action">
        <button id="add-btn" class="add-btn">+</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item">🗓️ Calendar</div>
        <div class="nav-item">📋 Lists</div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
