<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKR — Gestionnaire de tâches</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #131318;
      --surface2: #1a1a22;
      --border: rgba(255,255,255,0.07);
      --accent: #e8b86d;
      --accent2: #c97b3f;
      --text: #f0eee8;
      --muted: #6b6880;
      --danger: #e05c5c;
      --green: #5cb88a;
      --radius: 14px;
      --shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 80px;
      overflow-x: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,184,109,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(92,184,138,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
      animation: fadeIn .6s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }
    .logo span {
      color: var(--accent);
    }

    .header-meta {
      text-align: right;
    }
    .date-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .task-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      margin-top: 2px;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      border-radius: 50px;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .filter-btn.active {
      background: var(--surface2);
      color: var(--accent);
      box-shadow: 0 2px 12px rgba(232,184,109,0.15);
    }
    .filter-btn:hover:not(.active) { color: var(--text); }

    /* ── INPUT AREA ── */
    .input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 16px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .input-card:focus-within {
      border-color: rgba(232,184,109,0.3);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      padding: 4px 0;
    }
    .task-input::placeholder { color: var(--muted); }

    .meta-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .category-select, .priority-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 5px 10px;
      border-radius: 20px;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    .category-select:focus, .priority-select:focus {
      border-color: rgba(232,184,109,0.4);
    }

    .add-btn {
      background: var(--accent);
      color: #0c0c0f;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(232,184,109,0.25);
    }
    .add-btn:hover { background: #f0c87a; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(232,184,109,0.35); }
    .add-btn:active { transform: translateY(0); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── TASK LIST ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .25s ease;
      animation: slideIn .3s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }

    .task-item:hover { border-color: rgba(255,255,255,0.12); background: var(--surface2); }
    .task-item:hover::before { opacity: 1; }
    .task-item.done { opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    /* Priority accent */
    .task-item[data-priority="haute"]::before   { background: var(--danger); opacity: 1; }
    .task-item[data-priority="moyenne"]::before { background: var(--accent); opacity: 1; }
    .task-item[data-priority="basse"]::before   { background: var(--green); opacity: 1; }

    /* Checkbox */
    .check-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      transition: all .2s;
    }
    .check-wrap input:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-wrap input:checked::after {
      content: '';
      position: absolute;
      left: 6px; top: 3px;
      width: 7px; height: 11px;
      border: 2px solid #0c0c0f;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    /* Task text */
    .task-body { flex: 1; min-width: 0; }
    .task-text {
      font-size: 0.93rem;
      font-weight: 400;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .2s;
    }
    .task-meta-line {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .tag-cat {
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tag-prio-haute   { background: rgba(224,92,92,0.12); color: #e05c5c; }
    .tag-prio-moyenne { background: rgba(232,184,109,0.12); color: var(--accent); }
    .tag-prio-basse   { background: rgba(92,184,138,0.12); color: var(--green); }

    /* Action buttons */
    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s;
    }
    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: all .15s;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,184,109,0.08); }
    .action-btn.del:hover { border-color: var(--danger); color: var(--danger); background: rgba(224,92,92,0.08); }
